name: Dependabot auto-merge

# Auto-merges Dependabot minor/patch version bumps once all other checks pass.
# Major bumps are left for manual review. No branch protection required: the
# job waits for the PR's checks itself (excluding this workflow) and only
# merges if none failed. On each Dependabot rebase the PR re-syncs and this
# re-runs, so a lockfile-conflict cascade across grouped PRs self-resolves.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: auto-merge
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for checks, then squash-merge (minor/patch only)
        if: ${{ contains(fromJSON('["version-update:semver-minor","version-update:semver-patch"]'), steps.meta.outputs.update-type) }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          settled=0
          for i in $(seq 1 30); do
            sleep 30
            json=$(gh pr checks "$PR" --repo "$REPO" --json name,bucket 2>/dev/null || echo '[]')
            # Ignore this workflow's own check so we don't wait on ourselves.
            ext=$(echo "$json" | jq '[.[] | select((.name | ascii_downcase) | test("auto-merge") | not)]')
            failed=$(echo "$ext" | jq '[.[] | select(.bucket == "fail")] | length')
            pending=$(echo "$ext" | jq '[.[] | select(.bucket == "pending")] | length')
            if [ "$failed" -gt 0 ]; then
              echo "A required check failed — not merging."
              exit 0
            fi
            if [ "$pending" -eq 0 ]; then settled=1; break; fi
          done
          if [ "$settled" = "1" ]; then
            gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
          else
            echo "Checks did not settle in time — leaving for manual review."
          fi
